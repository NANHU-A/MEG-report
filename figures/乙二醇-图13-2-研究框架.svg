<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs><style>.t{font:700 28px Arial;fill:#1f2937}.h{font:700 20px Arial;fill:#1f2937}.b{font:18px Arial;fill:#1f2937}.s{font:15px Arial;fill:#6b7280}.box{fill:#fff;stroke:#374151;stroke-width:2;rx:14;ry:14}.a{fill:#dbeafe}.b1{fill:#bfdbfe}.c{fill:#93c5fd}.d{fill:#60a5fa}</style></defs>
  <text x="24" y="40" class="t">研究框架</text><rect x="40" y="90" width="1320" height="560" class="box"/>
  <rect x="90" y="170" width="250" height="150" class="a"/><text x="165" y="215" class="h">成本</text><text x="130" y="252" class="s">原料与利润</text>
  <rect x="380" y="170" width="250" height="150" class="b1"/><text x="455" y="215" class="h">供给</text><text x="420" y="252" class="s">开工与进口</text>
  <rect x="670" y="170" width="250" height="150" class="c"/><text x="745" y="215" class="h">需求</text><text x="700" y="252" class="s">聚酯与终端</text>
  <rect x="960" y="170" width="250" height="150" class="d"/><text x="1030" y="215" class="h">结构</text><text x="995" y="252" class="s">基差/月差/价差</text>
  <text x="120" y="500" class="b">研究顺序：成本 → 供给 → 需求 → 结构 → 预期。</text>
</svg>
