<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs><style>.t{font:700 28px Arial;fill:#111827}.h{font:700 20px Arial;fill:#111827}.b{font:18px Arial;fill:#111827}.s{font:15px Arial;fill:#6b7280}.box{fill:#fff;stroke:#374151;stroke-width:2;rx:14;ry:14}.a{stroke:#374151;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#374151"/></marker></defs>
  <text x="24" y="40" class="t">乙二醇价格驱动链条</text><rect x="40" y="90" width="1320" height="560" class="box"/>
  <rect x="80" y="180" width="180" height="100" class="box"/><text x="120" y="225" class="h">原料</text><text x="105" y="255" class="s">成本锚</text>
  <rect x="300" y="180" width="180" height="100" class="box"/><text x="335" y="225" class="h">利润</text><text x="320" y="255" class="s">开工意愿</text>
  <rect x="520" y="180" width="180" height="100" class="box"/><text x="555" y="225" class="h">开工</text><text x="535" y="255" class="s">供给变化</text>
  <rect x="740" y="180" width="180" height="100" class="box"/><text x="770" y="225" class="h">库存</text><text x="750" y="255" class="s">压力中枢</text>
  <rect x="960" y="180" width="180" height="100" class="box"/><text x="990" y="225" class="h">现货</text><text x="975" y="255" class="s">价格中枢</text>
  <rect x="1180" y="180" width="140" height="100" class="box"/><text x="1200" y="225" class="h">期货</text><text x="1188" y="255" class="s">预期表达</text>
  <line x1="260" y1="230" x2="300" y2="230" class="a"/><line x1="480" y1="230" x2="520" y2="230" class="a"/><line x1="700" y1="230" x2="740" y2="230" class="a"/><line x1="920" y1="230" x2="960" y2="230" class="a"/><line x1="1140" y1="230" x2="1180" y2="230" class="a"/>
  <text x="120" y="450" class="b">价格驱动不是线性链条，而是成本、供需和预期共同作用。</text>
</svg>
