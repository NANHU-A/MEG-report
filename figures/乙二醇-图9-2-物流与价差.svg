<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs><style>.t{font:700 28px Arial;fill:#1f2937}.h{font:700 20px Arial;fill:#1f2937}.b{font:18px Arial;fill:#1f2937}.s{font:15px Arial;fill:#6b7280}.box{fill:#fff;stroke:#374151;stroke-width:2;rx:14;ry:14}.x{fill:#fef3c7}.y{fill:#dbeafe}.z{fill:#dcfce7}</style></defs>
  <text x="24" y="40" class="t">物流与价差</text><rect x="40" y="90" width="1320" height="560" class="box"/>
  <rect x="100" y="170" width="300" height="160" class="y"/><text x="180" y="220" class="h">价差扩大</text><text x="150" y="260" class="b">套利打开</text><text x="140" y="295" class="s">货物流动增强</text>
  <rect x="520" y="170" width="300" height="160" class="x"/><text x="600" y="220" class="h">价差收敛</text><text x="570" y="260" class="b">套利关闭</text><text x="560" y="295" class="s">货流减弱</text>
  <rect x="940" y="170" width="300" height="160" class="z"/><text x="1010" y="220" class="h">库存变化</text><text x="980" y="260" class="b">决定现货强弱</text><text x="970" y="295" class="s">影响基差方向</text>
  <text x="120" y="470" class="b">物流是价差的影子，价差又由供需与库存共同塑造。</text><text x="120" y="505" class="s">展示建议：把区域价差与港口库存并列呈现，最能体现乙二醇的交易逻辑。</text>
</svg>
