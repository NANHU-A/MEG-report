<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs><style>.t{font:700 28px Arial;fill:#111827}.h{font:700 20px Arial;fill:#111827}.b{font:18px Arial;fill:#111827}.s{font:15px Arial;fill:#6b7280}.box{fill:#fff;stroke:#374151;stroke-width:2;rx:14;ry:14}.m{fill:#bfdbfe}.o{fill:#fdba74}.g{fill:#86efac}.a{stroke:#374151;stroke-width:3;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#374151"/></marker></defs>
  <text x="24" y="40" class="t">全球平衡与物流网络</text><rect x="40" y="90" width="1320" height="560" class="box"/>
  <rect x="120" y="180" width="220" height="120" class="m"/><text x="175" y="225" class="h">中东出口</text><text x="160" y="260" class="s">向亚洲发货</text>
  <rect x="420" y="180" width="220" height="120" class="o"/><text x="475" y="225" class="h">北美出口</text><text x="460" y="260" class="s">远洋套利流向</text>
  <rect x="720" y="180" width="220" height="120" class="g"/><text x="785" y="225" class="h">亚洲进口</text><text x="770" y="260" class="s">港口库存变化</text>
  <rect x="1020" y="180" width="220" height="120" class="m"/><text x="1070" y="225" class="h">本地消费</text><text x="1050" y="260" class="s">聚酯链消化</text>
  <line x1="340" y1="240" x2="420" y2="240" class="a"/><line x1="640" y1="240" x2="720" y2="240" class="a"/><line x1="940" y1="240" x2="1020" y2="240" class="a"/>
  <rect x="120" y="400" width="1160" height="120" class="box"/><text x="150" y="448" class="b">物流流向是区域价差的结果，价差决定货流，货流决定库存。</text><text x="150" y="482" class="s">展示口径：全球平衡先看边际出口，再看亚洲吸收能力。</text>
</svg>
