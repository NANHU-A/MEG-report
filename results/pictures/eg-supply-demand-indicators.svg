      .line { fill:none; stroke:#7fa9c4; stroke-width:2.1; marker-end:url(#arrow); }
      .lineThin { fill:none; stroke:#9abfd2; stroke-width:1.7; marker-end:url(#arrow); }
      .dash { fill:none; stroke:#6f9fbe; stroke-width:2.1; stroke-dasharray:10 10; marker-end:url(#arrow); }
    </style>
  </defs>

