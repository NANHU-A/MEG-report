<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#6f9fbe"/>
    </marker>
    <style>
      .bg { fill:#efefef; }
      .title { font-family:"Microsoft YaHei",sans-serif; font-size:56px; font-weight:700; fill:#111; }
