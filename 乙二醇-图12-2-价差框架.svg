<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs><style>.t{font:700 28px Arial;fill:#1f2937}.h{font:700 20px Arial;fill:#1f2937}.b{font:18px Arial;fill:#1f2937}.s{font:15px Arial;fill:#6b7280}.box{fill:#fff;stroke:#374151;stroke-width:2;rx:14;ry:14}.a{fill:#dbeafe}.b1{fill:#fef3c7}.c{fill:#dcfce7}.d{fill:#fee2e2}</style></defs>
  <text x="24" y="40" class="t">利润、基差、月差与价差</text><rect x="40" y="90" width="1320" height="560" class="box"/>
  <rect x="100" y="170" width="280" height="160" class="a"/><text x="195" y="220" class="h">利润</text><text x="155" y="260" class="s">供给意愿</text>
  <rect x="420" y="170" width="280" height="160" class="b1"/><text x="515" y="220" class="h">基差</text><text x="470" y="260" class="s">现货压力</text>
  <rect x="740" y="170" width="280" height="160" class="c"/><text x="835" y="220" class="h">月差</text><text x="790" y="260" class="s">预期结构</text>
  <rect x="1060" y="170" width="220" height="160" class="d"/><text x="1125" y="220" class="h">价差</text><text x="1090" y="260" class="s">内外盘/品种</text>
  <text x="120" y="490" class="b">展示逻辑：利润看供给，基差看现货，月差看预期，价差看套利。</text>
</svg>
