<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <style>
      .t { font: 700 28px Arial, sans-serif; fill: #111827; }
      .h { font: 700 20px Arial, sans-serif; fill: #111827; }
      .b { font: 18px Arial, sans-serif; fill: #111827; }
      .s { font: 15px Arial, sans-serif; fill: #6b7280; }
      .box { fill: #ffffff; stroke: #374151; stroke-width: 2; rx: 16; ry: 16; }
      .x { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 16; ry: 16; }
      .y { fill: #fffbeb; stroke: #d97706; stroke-width: 2; rx: 16; ry: 16; }
      .z { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 16; ry: 16; }
      .q { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 16; ry: 16; }
    </style>
  </defs>
  <text x="24" y="40" class="t">供需状态判断矩阵</text>
  <rect x="40" y="90" width="1320" height="560" class="box"/>

  <rect x="120" y="170" width="500" height="170" class="q"/>
  <text x="150" y="215" class="h">供给宽松 + 需求走弱</text>
  <text x="150" y="255" class="b">高库存 / 弱基差 / 现货承压</text>
  <text x="150" y="295" class="s">价格通常偏弱，近月压力更大</text>

  <rect x="720" y="170" width="500" height="170" class="z"/>
  <text x="750" y="215" class="h">供给收缩 + 需求改善</text>
  <text x="750" y="255" class="b">去库存 / 强基差 / 现货偏紧</text>
  <text x="750" y="295" class="s">价格与价差共振向上</text>

  <rect x="120" y="400" width="500" height="170" class="y"/>
  <text x="150" y="445" class="h">供给收缩 + 需求走弱</text>
  <text x="150" y="485" class="b">库存变化不大 / 交易预期为主</text>
  <text x="150" y="525" class="s">价格往往震荡，方向不够明确</text>

  <rect x="720" y="400" width="500" height="170" class="x"/>
  <text x="750" y="445" class="h">供给宽松 + 需求改善</text>
  <text x="750" y="485" class="b">去库缓慢 / 利润修复有限</text>
  <text x="750" y="525" class="s">价格弹性受成本约束较大</text>
</svg>
