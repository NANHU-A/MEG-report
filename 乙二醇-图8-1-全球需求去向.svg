<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs><style>.t{font:700 28px Arial;fill:#111827}.h{font:700 20px Arial;fill:#111827}.b{font:18px Arial;fill:#111827}.s{font:15px Arial;fill:#6b7280}.box{fill:#fff;stroke:#374151;stroke-width:2;rx:14;ry:14}.a{fill:#dbeafe}.b1{fill:#bfdbfe}.c{fill:#93c5fd}</style></defs>
  <text x="24" y="40" class="t">全球需求去向</text><rect x="40" y="90" width="1320" height="560" class="box"/>
  <circle cx="320" cy="320" r="125" class="a"/><text x="270" y="315" class="h">纤维级</text><text x="240" y="350" class="s">长丝 / 短纤</text>
  <circle cx="700" cy="320" r="125" class="b1"/><text x="650" y="315" class="h">包装级</text><text x="615" y="350" class="s">PET瓶片</text>
  <circle cx="1080" cy="320" r="125" class="c"/><text x="1030" y="315" class="h">其他消费</text><text x="1000" y="350" class="s">日化/薄膜等</text>
  <text x="120" y="520" class="b">需求高度集中于聚酯链，纤维级仍是核心。</text><text x="120" y="555" class="s">消费改善先体现为聚酯负荷上行，再传导至乙二醇补库。</text>
</svg>
